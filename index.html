<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rush Platformer - JP's Challenge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      width: 90vw;
      height: 85vh;
      max-width: 1200px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    #game-canvas {
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
      display: block;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .ui-element {
      pointer-events: auto;
    }
    #score-board {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
    }
    #timer {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 69, 0, 0.9);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 24px;
      font-weight: bold;
      font-family: monospace;
    }
    #level-info {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(76, 175, 80, 0.9);
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: bold;
    }
    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
    }
    .controls-hint {
      margin: 5px 0;
      color: #FFD700;
    }
    #start-screen, #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      pointer-events: all;
      z-index: 100;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      color: #FFD700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
      max-width: 600px;
      text-align: center;
      line-height: 1.6;
    }
    button {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: bold;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
    }
    .hidden {
      display: none !important;
    }
    #health-bar {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 200px;
      height: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      overflow: hidden;
    }
    #health-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6B6B 0%, #4CAF50 100%);
      width: 100%;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
      <div id="score-board" class="ui-element hidden">
        Score: <span id="score">0</span>
      </div>
      
      <div id="level-info" class="ui-element hidden">
        Niveau <span id="level">1</span>
      </div>
      
      <div id="timer" class="ui-element hidden">
        00:00
      </div>
      
      <div id="controls-hint" class="ui-element hidden">
        <div class="controls-hint">← → : Bouger</div>
        <div class="controls-hint">Espace : Sauter</div>
        <div class="controls-hint">D : Chuter rapide</div>
      </div>
      
      <div id="health-bar" class="ui-element hidden">
        <div id="health-fill"></div>
      </div>
    </div>
    
    <div id="start-screen">
      <h1>🎮 Rush Platformer</h1>
      <p>Aide JP à traverser ce niveau de plateforme en temps record ! Évite les ennemis et collecte les points.</p>
      <p><strong>Objectif :</strong> Survivre 60 seconds et récolter un maximum de points !</p>
      <button onclick="startGame()">Commencer</button>
    </div>
    
    <div id="game-over-screen" class="hidden">
      <h1 id="game-over-title">Game Over</h1>
      <p id="game-over-message">Score final : 0</p>
      <button onclick="restartGame()">Rejouer</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
